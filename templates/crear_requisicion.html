{% extends "base.html" %}
{% block title %}Nueva Requisicion{% endblock %}
{% block content %}
<article>
    <h2>Nueva Requisicion</h2>
    <p class="page-subtitle">Registra la solicitud para cliente y agrega los items requeridos.</p>
    <form method="POST" action="/crear">
        <div class="form-grid-3">
            <label>
                Departamento
                <input type="text" value="{{ current_user.departamento }}" readonly>
            </label>
            <label>
                Codigo cliente
                <input type="text" name="cliente_codigo" required minlength="2" placeholder="Ej: C-1023">
            </label>
            <label>
                Nombre cliente
                <input type="text" name="cliente_nombre" required minlength="3" placeholder="Nombre cliente">
            </label>
            <label>
                Ruta Principal del Cliente
                <input
                    type="text"
                    name="cliente_ruta_principal"
                    required
                    minlength="4"
                    maxlength="4"
                    pattern="[A-Za-z]{2}[0-9]{2}"
                    placeholder="Ej: RA02"
                >
            </label>
        </div>
        <label>
            Justificacion
            <textarea name="justificacion" rows="4" required></textarea>
        </label>

        <fieldset id="items-container">
            <legend>Items</legend>
            <div class="item-row">
                <select name="items[0][descripcion]" required>
                    <option value="">Seleccionar item...</option>
                    {% for item in catalogo_items %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                </select>
                <input type="number" step="0.01" min="0.01" name="items[0][cantidad]" placeholder="Cantidad" required>
            </div>
        </fieldset>

        <button type="button" onclick="agregarItem()">+ Agregar item</button>
        <button type="submit">Crear y enviar</button>
    </form>
</article>

<script>
window.CATALOGO_ITEMS = {{ catalogo_items | tojson }};
</script>
<script src="/static/app.js"></script>
{% endblock %}
