{% extends "base.html" %}
{% import "macros/ui.html" as ui %}
{% block title %}Cambiar contrasena{% endblock %}
{% block content %}
{{ ui.page_header("Cambiar contrasena", "Actualiza tu contrasena de acceso a la aplicacion.") }}
<section class="view-panel panel">
    <form method="POST" action="/mi-cuenta/password">
        <label>Contrasena actual
            <input type="password" name="current_password" required autocomplete="current-password">
        </label>
        <label>Nueva contrasena
            <input type="password" name="new_password" minlength="8" required autocomplete="new-password">
        </label>
        <label>Confirmar nueva contrasena
            <input type="password" name="confirm_password" minlength="8" required autocomplete="new-password">
        </label>
        <small class="status-muted">Minimo 8 caracteres.</small>
        <div class="form-actions" style="margin-top: 1rem;">
            <button type="submit">Guardar cambios</button>
        </div>
    </form>
</section>
{% endblock %}
